name: Build

on:
  push:
  pull_request:

jobs:
  package:
    runs-on: ubuntu-latest

    env:
      JITPACK_MAX_SIZE_MB: 100

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Package with Maven
        run: mvn -B package -DskipTests

      - name: Check tar.xz size limit in target
        shell: bash
        run: |
          set -euo pipefail

          limit_bytes=$((JITPACK_MAX_SIZE_MB * 1024 * 1024))
          failed=0

          if [ ! -d target ]; then
            echo "target directory does not exist"
            exit 0
          fi

          while IFS= read -r -d '' file; do
            size_bytes=$(stat -c%s "$file")
            size_human=$(numfmt --to=iec-i --suffix=B "$size_bytes")
            limit_human=$(numfmt --to=iec-i --suffix=B "$limit_bytes")

            echo "Checking $file ($size_human, limit: $limit_human)"

            if [ "$size_bytes" -gt "$limit_bytes" ]; then
              echo "::error file=$file::tar.xz file exceeds JitPack upload size limit ($size_human > $limit_human)"
              failed=1
            fi
          done < <(find target -type f -name '*.tar.xz' -print0)

          if [ "$failed" -ne 0 ]; then
            exit 1
          fi
