name: Build

on:
  push:
  pull_request:

jobs:
  package:
    runs-on: ubuntu-latest

    env:
      JITPACK_MAX_SIZE_MB: 99

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Java 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '25'
          cache: maven

      - name: Package with Maven
        run: mvn -B package -DskipTests

      - name: Check tar.xz size limit in Maven target directories
        shell: bash
        run: |
          set -euo pipefail

          limit_bytes=$((JITPACK_MAX_SIZE_MB * 1024 * 1024))
          failed=0
          found=0

          while IFS= read -r -d '' file; do
            found=1

            size_bytes=$(stat -c%s "$file")
            size_human=$(numfmt --to=iec-i --suffix=B "$size_bytes")
            limit_human=$(numfmt --to=iec-i --suffix=B "$limit_bytes")

            echo "Checking $file ($size_human, limit: $limit_human)"

            if [ "$size_bytes" -gt "$limit_bytes" ]; then
              echo "::error file=$file::tar.xz file exceeds JitPack upload size limit ($size_human > $limit_human)"
              failed=1
            fi
          done < <(find . -type f -path '*/target/*.tar.xz' -print0)

          if [ "$found" -eq 0 ]; then
            echo "::warning::No .tar.xz files found in any target directory"
          fi

          if [ "$failed" -ne 0 ]; then
            exit 1
          fi
