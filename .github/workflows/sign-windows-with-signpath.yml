name: Sign Windows executables with SignPath

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to build and sign (tag or branch). Defaults to the ref used to start the workflow.
        required: false
        type: string
      signing_policy_slug:
        description: SignPath signing policy slug. Keep test-signing until the workflow has been validated.
        required: true
        default: release-signing
        type: string

concurrency:
  group: signpath-windows-${{ github.event.inputs.ref || github.ref }}
  cancel-in-progress: false

permissions:
  actions: write
  contents: write

jobs:
  sign-windows-executables:
    runs-on: windows-latest

    steps:
      - name: Resolve checkout ref
        id: context
        shell: pwsh
        env:
          INPUT_REF: ${{ github.event.inputs.ref }}
          GITHUB_REF_VALUE: ${{ github.ref }}
        run: |
          $checkoutRef = if ([string]::IsNullOrWhiteSpace($env:INPUT_REF)) {
            $env:GITHUB_REF_VALUE
          } else {
            $env:INPUT_REF
          }

          "checkout_ref=$checkoutRef" >> $env:GITHUB_OUTPUT

      - name: Validate SignPath configuration
        shell: pwsh
        env:
          SIGNPATH_API_TOKEN: ${{ secrets.SIGNPATH_API_TOKEN }}
          SIGNPATH_ORGANIZATION_ID: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
          SIGNPATH_PROJECT_SLUG: ${{ vars.SIGNPATH_PROJECT_SLUG }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:SIGNPATH_API_TOKEN)) {
            throw "Missing SIGNPATH_API_TOKEN secret."
          }

          if ([string]::IsNullOrWhiteSpace($env:SIGNPATH_ORGANIZATION_ID)) {
            throw "Missing SIGNPATH_ORGANIZATION_ID repository variable."
          }

          if ([string]::IsNullOrWhiteSpace($env:SIGNPATH_PROJECT_SLUG)) {
            throw "Missing SIGNPATH_PROJECT_SLUG repository variable."
          }

      - name: Checkout workflow tools
        uses: actions/checkout@v6
        with:
          ref: ${{ github.sha }}
          path: workflow-tools
          persist-credentials: false

      - name: Checkout source ref
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.context.outputs.checkout_ref }}
          path: source
          persist-credentials: false

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: "25"
          distribution: temurin
          cache: maven

      - name: Build with Maven
        shell: pwsh
        working-directory: source
        run: mvn --no-transfer-progress -B package

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Build unsigned Windows bundle
        id: artifacts
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $workspace = $env:GITHUB_WORKSPACE
          $sourceRoot = Join-Path $workspace 'source'

          # Extract version from pom.xml instead of exe filename
          $pomPath = Join-Path $sourceRoot 'pom.xml'
          [xml]$pom = Get-Content $pomPath
          $version = $pom.project.version
          if ([string]::IsNullOrWhiteSpace($version)) {
            throw "Could not extract version from pom.xml."
          }

          # Look for the version-agnostic exe filename
          $appExecutable = Get-ChildItem (Join-Path $sourceRoot 'assembler\target\windows') -Filter 'jd-gui-duo.exe' | Select-Object -First 1
          if ($null -eq $appExecutable) {
            throw "No application executable 'jd-gui-duo.exe' was found in assembler\target\windows."
          }

          $archive = Get-ChildItem (Join-Path $sourceRoot 'assembler\target') -Filter 'jd-gui-duo-windows-*.tar.xz' | Select-Object -First 1
          if ($null -eq $archive) {
            throw "No Windows archive matching jd-gui-duo-windows-*.tar.xz was found in assembler\target."
          }

          "version=$version" >> $env:GITHUB_OUTPUT
          "app_executable=$($appExecutable.FullName)" >> $env:GITHUB_OUTPUT
          "windows_archive=$($archive.FullName)" >> $env:GITHUB_OUTPUT

      - name: Upload app signing input
        id: upload_app_signing_input
        uses: actions/upload-artifact@v7
        with:
          name: unsigned-windows-app-signing-input-${{ steps.artifacts.outputs.version }}
          path: ${{ steps.artifacts.outputs.app_executable }}
          if-no-files-found: error

      - name: Submit SignPath app signing request
        id: sign_app
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
          project-slug: ${{ vars.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ github.event.inputs.signing_policy_slug }}
          artifact-configuration-slug: jd-gui-duo.exe
          github-artifact-id: ${{ steps.upload_app_signing_input.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: dist/signed-app
          parameters: |
            version: ${{ toJSON(steps.artifacts.outputs.version) }}

      - name: Build installer with signed app executable
        id: signed_bundle
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $version = "${{ steps.artifacts.outputs.version }}"
          $toolsRoot = Join-Path $env:GITHUB_WORKSPACE 'workflow-tools'
          $buildInstallerScript = Join-Path $toolsRoot 'packaging\windows\build-installer.ps1'
          if (-not (Test-Path $buildInstallerScript)) {
            throw "The installer helper script was not found at $buildInstallerScript."
          }

          $signedAppExecutables = @(Get-ChildItem 'dist\signed-app' -Recurse -File -Filter 'jd-gui-duo.exe')
          if ($signedAppExecutables.Count -ne 1) {
            throw "Expected exactly one signed jd-gui-duo.exe in dist\signed-app, found $($signedAppExecutables.Count)."
          }

          function Replace-AppExecutable {
            param(
              [Parameter(Mandatory = $true)][string]$Root,
              [Parameter(Mandatory = $true)][string]$SignedExecutable
            )

            $targets = @(Get-ChildItem $Root -Recurse -File -Filter 'jd-gui-duo.exe')
            if ($targets.Count -eq 0) {
              throw "No jd-gui-duo.exe was found under $Root."
            }

            foreach ($target in $targets) {
              Copy-Item $SignedExecutable $target.FullName -Force
            }
          }

          $bundleRoot = Join-Path $PWD 'dist\signed-bundle'
          if (Test-Path $bundleRoot) {
            Remove-Item -Recurse -Force $bundleRoot
          }
          New-Item -ItemType Directory -Force -Path $bundleRoot | Out-Null

          $extractRoot = Join-Path $bundleRoot 'windows'
          New-Item -ItemType Directory -Force -Path $extractRoot | Out-Null
          tar -xf "${{ steps.artifacts.outputs.windows_archive }}" -C $extractRoot
          if ($LASTEXITCODE -ne 0) {
            throw "Failed to extract ${{ steps.artifacts.outputs.windows_archive }}."
          }

          Replace-AppExecutable -Root $extractRoot -SignedExecutable $signedAppExecutables[0].FullName

          $signedArchivePath = Join-Path $bundleRoot "jd-gui-duo-windows-$version.tar.xz"
          $tarEntries = @(Get-ChildItem $extractRoot -Force | ForEach-Object { $_.Name })
          if ($tarEntries.Count -eq 0) {
            throw "No entries were found after extracting the Windows archive."
          }
          tar -cJf $signedArchivePath -C $extractRoot @tarEntries
          if ($LASTEXITCODE -ne 0) {
            throw "Failed to rebuild jd-gui-duo-windows-$version.tar.xz with the signed app executable."
          }

          $unsignedInstallerPath = Join-Path $bundleRoot "jd-gui-duo-windows-$version-setup.exe"
          & $buildInstallerScript `
            -InputArchive $signedArchivePath `
            -OutputInstaller $unsignedInstallerPath `
            -AppVersion $version

          if (-not (Test-Path $unsignedInstallerPath)) {
            throw "The installer was not created at $unsignedInstallerPath."
          }

          "signed_windows_archive=$signedArchivePath" >> $env:GITHUB_OUTPUT
          "unsigned_installer_executable=$unsignedInstallerPath" >> $env:GITHUB_OUTPUT

      - name: Upload installer signing input
        id: upload_installer_signing_input
        uses: actions/upload-artifact@v7
        with:
          name: unsigned-windows-installer-signing-input-${{ steps.artifacts.outputs.version }}
          path: ${{ steps.signed_bundle.outputs.unsigned_installer_executable }}
          if-no-files-found: error

      - name: Submit SignPath installer signing request
        id: sign_installer
        uses: signpath/github-action-submit-signing-request@v2
        with:
          api-token: ${{ secrets.SIGNPATH_API_TOKEN }}
          organization-id: ${{ vars.SIGNPATH_ORGANIZATION_ID }}
          project-slug: ${{ vars.SIGNPATH_PROJECT_SLUG }}
          signing-policy-slug: ${{ github.event.inputs.signing_policy_slug }}
          artifact-configuration-slug: installer
          github-artifact-id: ${{ steps.upload_installer_signing_input.outputs.artifact-id }}
          wait-for-completion: true
          output-artifact-directory: dist/signed-installer
          parameters: |
            version: ${{ toJSON(steps.artifacts.outputs.version) }}

      - name: Prepare signed executables artifact
        id: signed_executables
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'

          $version = "${{ steps.artifacts.outputs.version }}"
          $outputRoot = Join-Path $PWD 'dist\signed-executables'
          if (Test-Path $outputRoot) {
            Remove-Item -Recurse -Force $outputRoot
          }
          New-Item -ItemType Directory -Force -Path $outputRoot | Out-Null

          $signedAppExecutables = @(Get-ChildItem 'dist\signed-app' -Recurse -File -Filter 'jd-gui-duo.exe')
          if ($signedAppExecutables.Count -ne 1) {
            throw "Expected exactly one signed jd-gui-duo.exe in dist\signed-app, found $($signedAppExecutables.Count)."
          }

          $setupAssetName = "jd-gui-duo-windows-$version-setup.exe"
          $signedInstallerExecutables = @(Get-ChildItem 'dist\signed-installer' -Recurse -File -Filter $setupAssetName)
          if ($signedInstallerExecutables.Count -ne 1) {
            throw "Expected exactly one signed $setupAssetName in dist\signed-installer, found $($signedInstallerExecutables.Count)."
          }

          Copy-Item $signedAppExecutables[0].FullName (Join-Path $outputRoot 'jd-gui-duo.exe') -Force
          Copy-Item $signedInstallerExecutables[0].FullName (Join-Path $outputRoot $setupAssetName) -Force

          "path=$outputRoot" >> $env:GITHUB_OUTPUT

      - name: Upload signed executables
        uses: actions/upload-artifact@v7
        with:
          name: signed-windows-executables-${{ steps.artifacts.outputs.version }}
          path: ${{ steps.signed_executables.outputs.path }}/*
          if-no-files-found: error

      - name: Download published signed executables
        if: ${{ github.event.inputs.signing_policy_slug == 'release-signing' }}
        uses: actions/download-artifact@v7
        with:
          name: signed-windows-executables-${{ steps.artifacts.outputs.version }}
          path: dist/published-signed

      - name: Update release Windows assets
        if: ${{ github.event.inputs.signing_policy_slug == 'release-signing' }}
        id: update_release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = 'Stop'

          $version = "${{ steps.artifacts.outputs.version }}"
          $repo = "${{ github.repository }}"
          $checkoutRef = "${{ steps.context.outputs.checkout_ref }}"
          $signedRoot = Resolve-Path 'dist\published-signed'
          $toolsRoot = Join-Path $env:GITHUB_WORKSPACE 'workflow-tools'
          $portableZipScript = Join-Path $toolsRoot 'packaging\windows\build-portable-zip.ps1'

          $setupAssetName = "jd-gui-duo-windows-$version-setup.exe"
          $zipAssetName = "jd-gui-duo-windows-$version.zip"
          $tarXzAssetName = "jd-gui-duo-windows-$version.tar.xz"

          if (-not (Test-Path $portableZipScript)) {
            throw "The portable zip helper script was not found at $portableZipScript."
          }

          $signedAppExecutables = @(Get-ChildItem $signedRoot -Recurse -File -Filter 'jd-gui-duo.exe')
          if ($signedAppExecutables.Count -ne 1) {
            throw "Expected exactly one signed jd-gui-duo.exe in $signedRoot, found $($signedAppExecutables.Count)."
          }

          $signedInstallerExecutables = @(Get-ChildItem $signedRoot -Recurse -File -Filter $setupAssetName)
          if ($signedInstallerExecutables.Count -ne 1) {
            throw "Expected exactly one signed $setupAssetName in $signedRoot, found $($signedInstallerExecutables.Count)."
          }

          $expectedReleaseTags = @("v$version", $version)
          $releaseTag = $null
          if ($checkoutRef -match '^refs/tags/(.+)$') {
            $releaseTag = $Matches[1]
          } elseif ($expectedReleaseTags -contains $checkoutRef) {
            $releaseTag = $checkoutRef
          }

          if ([string]::IsNullOrWhiteSpace($releaseTag) -or $expectedReleaseTags -notcontains $releaseTag) {
            throw "Ref '$checkoutRef' is not a release tag matching version '$version'. Refuse to upload assets unless the workflow is built from tag '$version' or 'v$version'."
          }

          gh release view $releaseTag --repo $repo 1>$null 2>$null
          if ($LASTEXITCODE -ne 0) {
            throw "No GitHub release exists for validated tag '$releaseTag' in repository '$repo'."
          }

          $release = gh release view $releaseTag --repo $repo --json assets | ConvertFrom-Json
          $publishedAssetNames = @($release.assets | ForEach-Object { $_.name })
          foreach ($assetName in @($setupAssetName, $tarXzAssetName)) {
            if ($publishedAssetNames -notcontains $assetName) {
              throw "Release '$releaseTag' does not contain required asset '$assetName'."
            }
          }

          $releaseAssetRoot = Join-Path $PWD 'dist\release-assets'
          New-Item -ItemType Directory -Force -Path $releaseAssetRoot | Out-Null
          foreach ($assetName in @($setupAssetName, $tarXzAssetName)) {
            gh release download $releaseTag --repo $repo --pattern $assetName --dir $releaseAssetRoot
            if ($LASTEXITCODE -ne 0) {
              throw "Failed to download release asset '$assetName'."
            }
          }

          function Replace-AppExecutable {
            param(
              [Parameter(Mandatory = $true)][string]$Root,
              [Parameter(Mandatory = $true)][string]$SignedExecutable
            )

            $targets = @(Get-ChildItem $Root -Recurse -File -Filter 'jd-gui-duo.exe')
            if ($targets.Count -eq 0) {
              throw "No jd-gui-duo.exe was found under $Root."
            }

            foreach ($target in $targets) {
              Copy-Item $SignedExecutable $target.FullName -Force
            }
          }

          $setupAssetPath = Join-Path $releaseAssetRoot $setupAssetName
          Copy-Item $signedInstallerExecutables[0].FullName $setupAssetPath -Force

          $tarXzAssetPath = Join-Path $releaseAssetRoot $tarXzAssetName
          $tarXzExtractRoot = Join-Path $releaseAssetRoot 'tarxz'
          if (Test-Path $tarXzExtractRoot) {
            Remove-Item -Recurse -Force $tarXzExtractRoot
          }
          New-Item -ItemType Directory -Force -Path $tarXzExtractRoot | Out-Null
          tar -xf $tarXzAssetPath -C $tarXzExtractRoot
          if ($LASTEXITCODE -ne 0) {
            throw "Failed to extract $tarXzAssetName."
          }
          Replace-AppExecutable -Root $tarXzExtractRoot -SignedExecutable $signedAppExecutables[0].FullName
          $updatedTarXzPath = Join-Path $releaseAssetRoot "updated-$tarXzAssetName"
          if (Test-Path $updatedTarXzPath) {
            Remove-Item -Force $updatedTarXzPath
          }
          $tarEntries = @(Get-ChildItem $tarXzExtractRoot -Force | ForEach-Object { $_.Name })
          if ($tarEntries.Count -eq 0) {
            throw "No entries were found after extracting $tarXzAssetName."
          }
          tar -cJf $updatedTarXzPath -C $tarXzExtractRoot @tarEntries
          if ($LASTEXITCODE -ne 0) {
            throw "Failed to rebuild $tarXzAssetName."
          }
          Move-Item $updatedTarXzPath $tarXzAssetPath -Force

          $zipAssetPath = Join-Path $releaseAssetRoot $zipAssetName
          & $portableZipScript `
            -InputArchive $tarXzAssetPath `
            -OutputZip $zipAssetPath
          if (-not (Test-Path $zipAssetPath)) {
            throw "Failed to rebuild $zipAssetName."
          }

          gh release upload $releaseTag $setupAssetPath $zipAssetPath $tarXzAssetPath --repo $repo --clobber
          if ($LASTEXITCODE -ne 0) {
            throw "Failed to upload signed Windows release assets."
          }

          foreach ($workflowName in @('publish-chocolatey.yml', 'publish-winget.yml')) {
            gh workflow run $workflowName --repo $repo -f "tag=$releaseTag"
            if ($LASTEXITCODE -ne 0) {
              throw "Failed to trigger $workflowName for $releaseTag."
            }
          }

          "release_tag=$releaseTag" >> $env:GITHUB_OUTPUT

      - name: Write summary
        shell: pwsh
        run: |
          $lines = @(
            "## SignPath",
            "",
            "- Ref: ${{ steps.context.outputs.checkout_ref }}",
            "- Version: ${{ steps.artifacts.outputs.version }}",
            "- Signing policy: ${{ github.event.inputs.signing_policy_slug }}",
            "- App signing request: ${{ steps.sign_app.outputs.signing-request-web-url }}",
            "- Installer signing request: ${{ steps.sign_installer.outputs.signing-request-web-url }}",
            "- Signed files artifact: signed-windows-executables-${{ steps.artifacts.outputs.version }}"
          )

          if ("${{ github.event.inputs.signing_policy_slug }}" -eq 'release-signing') {
            $lines += "- Updated release: ${{ steps.update_release.outputs.release_tag }}"
            $lines += "- Triggered package publishers: publish-chocolatey.yml, publish-winget.yml"
          } else {
            $lines += "- Release update: skipped for non-production signing policy"
          }

          [string]::Join([Environment]::NewLine, $lines) | Add-Content -Path $env:GITHUB_STEP_SUMMARY
