name: "Github Release"

on:
  push:
    tags:
      - "*"

jobs:
  tagged-release:
    name: "Github Release"
    runs-on: "windows-latest"
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}

    steps:
    - name: Resolve version
      id: release
      shell: pwsh
      run: |
        $tag = "${{ github.ref_name }}"
        if ([string]::IsNullOrWhiteSpace($tag)) {
          throw "A release tag is required."
        }

        $version = $tag -replace '^v', ''

        "tag=$tag" >> $env:GITHUB_OUTPUT
        "value=$version" >> $env:GITHUB_OUTPUT

    - uses: actions/checkout@v6
    - name: Set up JDK 25
      uses: actions/setup-java@v5
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: maven
    - name: Build with Maven
      run: mvn --no-transfer-progress -B package
    - name: Install Inno Setup
      shell: pwsh
      run: choco install innosetup --no-progress -y
    - name: Build Windows installer
      shell: pwsh
      run: |
        $archive = Get-ChildItem assembler\target -Filter *windows*.tar.xz | Select-Object -First 1
        if ($null -eq $archive) {
          throw "No Windows archive matching *windows*.tar.xz was found in assembler\\target."
        }

        .\packaging\windows\build-installer.ps1 `
          -InputArchive $archive.FullName `
          -OutputInstaller "assembler\target\jd-gui-duo-windows-${{ steps.release.outputs.value }}-setup.exe" `
          -AppVersion "${{ steps.release.outputs.value }}"
    - name: Create release
      uses: "marvinpinto/action-automatic-releases@latest"
      with:
        repo_token: "${{ secrets.GITHUB_TOKEN }}"
        prerelease: false
        automatic_release_tag: "${{ steps.release.outputs.tag }}"
        files: |
          **/jd-*.tar.xz
          **/jd-gui-duo-windows-*-setup.exe
    - name: Trigger downstream workflows
      shell: pwsh
      env:
        GH_TOKEN: ${{ secrets.PAT_TOKEN }}
      run: |
        $tag = "${{ steps.release.outputs.tag }}"
        $repo = "${{ github.repository }}"

        gh workflow run rewrite-release-notes.yml --repo $repo
        gh workflow run crosspost.yml --repo $repo -f tag=$tag
