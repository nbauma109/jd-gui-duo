name: Prepare Homebrew cask

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to prepare
        required: true
        type: string

concurrency:
  group: prepare-homebrew-cask-${{ github.event.release.tag_name || github.event.inputs.tag }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  prepare-homebrew-cask:
    runs-on: macos-latest
    env:
      GH_TOKEN: ${{ github.token }}
      PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
      HOMEBREW_CASK_FORK_REPOSITORY: ${{ vars.HOMEBREW_CASK_FORK_REPOSITORY }}
      HOMEBREW_CASK_FORK_BRANCH: ${{ vars.HOMEBREW_CASK_FORK_BRANCH }}
    steps:
      - name: Resolve release context
        id: release
        shell: bash
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          set -euo pipefail
          tag="${RELEASE_TAG:-${INPUT_TAG:-}}"
          if [[ -z "${tag}" ]]; then
            echo "A release tag is required." >&2
            exit 1
          fi

          version="${tag#v}"
          {
            echo "tag=${tag}"
            echo "version=${version}"
          } >> "${GITHUB_OUTPUT}"

      - uses: actions/checkout@v6
        with:
          ref: refs/tags/${{ steps.release.outputs.tag }}

      - name: Download macOS release archive
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          gh release download "${{ steps.release.outputs.tag }}" \
            --repo "${GITHUB_REPOSITORY}" \
            --pattern "*macos*.tar.xz" \
            --dir dist

      - name: Build macOS app zip
        id: zip
        shell: bash
        run: |
          set -euo pipefail
          zip_name="jd-gui-duo-macos-${{ steps.release.outputs.version }}.zip"
          zip_path="${PWD}/dist/${zip_name}"
          existing_asset="$(gh release view "${{ steps.release.outputs.tag }}" \
            --repo "${GITHUB_REPOSITORY}" \
            --json assets \
            --jq ".assets[] | select(.name == \"${zip_name}\") | .name")"

          if [[ -z "${existing_asset}" ]]; then
            archive_path="$(find dist -maxdepth 1 -type f -name '*.tar.xz' -print | head -n 1)"
            if [[ -z "${archive_path}" ]]; then
              echo "No macOS archive matching *macos*.tar.xz was found." >&2
              exit 1
            fi

            ./packaging/macos/build-app-zip.sh "${archive_path}" "${zip_path}"
            gh release upload "${{ steps.release.outputs.tag }}" "${zip_path}" --repo "${GITHUB_REPOSITORY}"
          else
            gh release download "${{ steps.release.outputs.tag }}" \
              --repo "${GITHUB_REPOSITORY}" \
              --pattern "${zip_name}" \
              --dir dist
          fi

          sha256="$(shasum -a 256 "${zip_path}" | awk '{print $1}')"
          asset_url="https://github.com/${GITHUB_REPOSITORY}/releases/download/${{ steps.release.outputs.tag }}/${zip_name}"

          {
            echo "zip_name=${zip_name}"
            echo "zip_url=${asset_url}"
            echo "zip_sha256=${sha256}"
          } >> "${GITHUB_OUTPUT}"

      - name: Generate cask
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist/homebrew
          sed \
            -e "s|__VERSION__|${{ steps.release.outputs.version }}|g" \
            -e "s|__SHA256__|${{ steps.zip.outputs.zip_sha256 }}|g" \
            -e "s|__URL__|${{ steps.zip.outputs.zip_url }}|g" \
            -e "s|__REPOSITORY__|${GITHUB_REPOSITORY}|g" \
            packaging/homebrew/jd-gui-duo.rb.in > dist/homebrew/jd-gui-duo.rb

      - name: Audit cask
        shell: bash
        run: |
          set -euo pipefail
          brew style dist/homebrew/jd-gui-duo.rb
          HOMEBREW_NO_INSTALL_FROM_API=1 brew audit --new --cask --strict dist/homebrew/jd-gui-duo.rb

      - name: Upload Homebrew cask artifact
        uses: actions/upload-artifact@v4
        with:
          name: homebrew-cask-${{ steps.release.outputs.version }}
          path: dist/homebrew

      - name: Push cask branch to fork
        id: fork
        if: ${{ env.PAT_TOKEN != '' }}
        shell: bash
        run: |
          set -euo pipefail
          fork_repo="${HOMEBREW_CASK_FORK_REPOSITORY:-${GITHUB_REPOSITORY_OWNER}/homebrew-cask}"
          branch_name="${HOMEBREW_CASK_FORK_BRANCH:-jd-gui-duo}"
          upstream_repo="Homebrew/homebrew-cask"
          upstream_branch="$(gh repo view "${upstream_repo}" --json defaultBranchRef --jq .defaultBranchRef.name)"
          fork_default_branch="$(gh repo view "${fork_repo}" --json defaultBranchRef --jq .defaultBranchRef.name)"
          upstream_cask_path="Casks/jd-gui-duo.rb"

          git clone --depth 1 --branch "${fork_default_branch}" \
            "https://x-access-token:${PAT_TOKEN}@github.com/${fork_repo}.git" homebrew-cask-fork

          cd homebrew-cask-fork
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git ls-remote --exit-code --heads origin "${branch_name}" >/dev/null 2>&1; then
            git fetch origin "${branch_name}:${branch_name}"
            git checkout "${branch_name}"
          else
            git checkout -b "${branch_name}"
          fi

          mkdir -p Casks
          cp ../dist/homebrew/jd-gui-duo.rb Casks/jd-gui-duo.rb
          git add Casks/jd-gui-duo.rb

          if git diff --cached --quiet; then
            echo "pushed=false" >> "${GITHUB_OUTPUT}"
          else
            upstream_has_cask="$(gh api "repos/${upstream_repo}/contents/${upstream_cask_path}?ref=${upstream_branch}" --silent >/dev/null 2>&1 && echo true || echo false)"
            if [[ "${upstream_has_cask}" == "true" ]]; then
              commit_message="jd-gui-duo ${{ steps.release.outputs.version }}"
            else
              commit_message="jd-gui-duo ${{ steps.release.outputs.version }} (new cask)"
            fi

            git commit -m "${commit_message}"
            git push origin "HEAD:${branch_name}"
            echo "pushed=true" >> "${GITHUB_OUTPUT}"
          fi

          {
            echo "fork_repo=${fork_repo}"
            echo "branch_name=${branch_name}"
            echo "compare_url=https://github.com/${upstream_repo}/compare/${upstream_branch}...${fork_repo%%/*}:${branch_name}?expand=1"
          } >> "${GITHUB_OUTPUT}"

      - name: Write summary
        shell: bash
        run: |
          {
            echo '## Homebrew'
            echo
            echo '- Generated a cask file suitable for a PR to `homebrew/homebrew-cask`.'
            echo '- Uploaded a macOS zip release asset because the official cask flow is happier with a single app archive than a custom tarball layout.'
            if [[ -n "${PAT_TOKEN}" ]]; then
              echo '- Prepared a branch in your Homebrew Cask fork for manual PR creation.'
              echo "- Fork branch: \`${{ steps.fork.outputs.fork_repo }}:${{ steps.fork.outputs.branch_name }}\`"
              echo "- Open PR: ${{ steps.fork.outputs.compare_url }}"
            else
              echo '- No `PAT_TOKEN` secret was configured, so the workflow stopped after generating the audited cask artifact.'
            fi
            echo '- Manual PR submission is still required.'
          } >> "${GITHUB_STEP_SUMMARY}"
